apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhai-workshop-plugin
  namespace: rhai-workshop-plugin
spec:
  template:
    spec:
      containers:
      - name: rhai-workshop-plugin
        volumeMounts:
        - mountPath: /etc/nginx/conf.d/proxy.conf
          name: showroom-proxy-conf
          readOnly: true
          subPath: proxy.conf
        - mountPath: /usr/share/nginx/html/proxy-users.json
          name: showroom-proxy-conf
          readOnly: true
          subPath: proxy-users.json
      volumes:
      - name: showroom-proxy-conf
        configMap:
          defaultMode: 420
          name: showroom-proxy-conf
